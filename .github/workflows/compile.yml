name: Compile SCMIJ Template

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    container:
      image: crpi-b75iph3qtzyryyvz.cn-hangzhou.personal.cr.aliyuncs.com/paper-prod/paper-sandbox-cli:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init
        run: bash init.sh

      - name: Compile
        run: tectonic -X compile main.tex

      - name: Verify Output
        run: |
          if [ ! -f main.pdf ]; then
            echo "ERROR: main.pdf not generated"
            exit 1
          fi
          SIZE=$(stat -c%s main.pdf)
          echo "main.pdf size: ${SIZE} bytes"
          if [ "$SIZE" -lt 10240 ]; then
            echo "ERROR: main.pdf too small (${SIZE} < 10240)"
            exit 1
          fi
          echo "Compilation successful!"

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: scmij-template
          path: main.pdf

  release:
    needs: compile
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download PDF
        uses: actions/download-artifact@v4
        with:
          name: scmij-template

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: main.pdf
          generate_release_notes: true
